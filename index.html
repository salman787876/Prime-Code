<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Prime Code</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login" class="card">
    <h1>Prime Code</h1>
    <p>تسجيل الدخول</p>

    <input type="text" id="discord" placeholder="Discord Username">
    <input type="text" id="realname" placeholder="اسمك الحقيقي">

    <button onclick="login()">دخول</button>
  </div>

  <!-- SERVICES -->
  <div id="services" class="card hidden">
    <h2>اختر الخدمة</h2>

    <button onclick="selectService('تصميم سيرفر')">تصميم سيرفر</button>
    <button onclick="selectService('برمجة سكربت')">برمجة سكربت</button>
    <button onclick="selectService('حماية')">حماية</button>
  </div>

  <!-- ORDER -->
  <div id="order" class="card hidden">
    <h2 id="serviceTitle"></h2>

    <input type="text" id="title" placeholder="عنوان الطلب">
    <textarea id="details" placeholder="اكتب تفاصيل الطلب..."></textarea>

    <button onclick="createOrder()">إرسال الطلب</button>

    <div id="result"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
