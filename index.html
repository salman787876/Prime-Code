<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Prime Code</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glass" id="loginBox">
  <h1>Prime Code</h1>
  <p>تسجيل الدخول</p>

  <input type="text" id="discord" placeholder="Discord Username">
  <input type="text" id="realname" placeholder="اسمك الحقيقي">

  <button onclick="login()">دخول</button>
</div>

<div class="glass hidden" id="orderBox">
  <h2>إنشاء طلب</h2>

  <select id="service">
    <option>تصميم سيرفر FiveM</option>
    <option>برمجة سكربت</option>
    <option>حماية سيرفر</option>
  </select>

  <input type="text" id="title" placeholder="عنوان الطلب">
  <textarea id="details" placeholder="اكتب تفاصيل الطلب..."></textarea>

  <button onclick="createOrder()">إرسال الطلب</button>

  <div id="result"></div>
</div>

</body>
<script src="script.js"></script>
</html>
