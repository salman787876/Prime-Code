<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Prime Code</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- LOGIN -->
  <div id="login" class="box active">
    <h1>Prime Code</h1>
    <span>Welcome</span>

    <input id="discord" placeholder="Discord Username">
    <input id="realname" placeholder="Full Name">

    <button onclick="login()">Continue</button>
  </div>

  <!-- SERVICES -->
  <div id="services" class="box">
    <h2>Select Service</h2>

    <div class="grid">
      <div onclick="selectService('FiveM Server')">FiveM Server</div>
      <div onclick="selectService('Script Development')">Script</div>
      <div onclick="selectService('Protection')">Protection</div>
    </div>
  </div>

  <!-- ORDER -->
  <div id="order" class="box">
    <h2 id="serviceTitle"></h2>

    <input id="title" placeholder="Order Title">
    <textarea id="details" placeholder="Explain what you want..."></textarea>

    <button onclick="createOrder()">Submit Order</button>

    <p id="result"></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
